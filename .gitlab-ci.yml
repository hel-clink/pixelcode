pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir public
    - cp index.html public/
    - cp style.css public/
    - cp app.js public/
    - cp -r lib public/
    - cp -r help public/
    - cp -r lang public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
